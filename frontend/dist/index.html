              html, body {
                background-color: #000;
                height: 100%;
                margin: 0;
                padding: 0;
                overflow: hidden;
              }

              /*
               * 全局游戏容器约束 — 430px 竖屏居中
               *
               * 规则：
               *   - 手机 (< 430px)  : 宽度 = 100%, 不留边距
               *   - 桌面 (≥ 430px)  : 宽度 = 430px, 水平居中, 两侧纯黑
               *
               * 技术说明：
               *   position:fixed + left/right 同时定义，浏览器会将两者
               *   都解释为距视口边的距离，从而精确限定元素的实际宽度。
               *   max(0px, calc(50vw - 215px)) 在宽屏上计算出两侧留白，
               *   在窄屏上退化为 0（不留白）。
               *   overflow:hidden 确保任何内部溢出都被裁剪到 430px 内。
               */
              body > div:first-child {
                position: fixed !important;
                top: 0 !important;
                bottom: 0 !important;
                left: max(0px, calc(50vw - 215px)) !important;
                right: max(0px, calc(50vw - 215px)) !important;
                overflow: hidden !important;
                background-color: #000 !important;
              }

              /* 透明背景修正：防止浏览器给 img 叠加白色背景 */
              img { background: transparent !important; background-color: transparent !important; }

              /* 无障碍相关：允许 tab/heading 内容可见溢出 */
              [role="tablist"] [role="tab"] * { overflow: visible !important; }
              [role="heading"], [role="heading"] * { overflow: visible !important; }
